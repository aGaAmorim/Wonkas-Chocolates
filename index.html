<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Wonka’s Chocolate's Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top-bar">
    <div id="contadorRodadas">Rodadas: 0</div>

    <h1>
        <img src="ticket.png" alt="Ticket" class="icone">
        Wonka’s Chocolate's
    </h1>

    <button onclick="novaRodada()">Nova Rodada</button>
</div>

<p class="subtitulo">Escolha 3 cartas e encontre os Golden Tickets!</p>
    <div class="grid" id="grid">
    </div> <p id="message"></p>

<!-- Modal de senha -->
<div id="modalSenha" class="modal">
    <div class="modal-content">
        <h3>🔒 Área do Administrador</h3>

        <input type="password" id="inputSenha" placeholder="Senha">
        <br><br>

        <input type="number" id="qtdRodadas" placeholder="Qtd de rodadas" min="1">
        <br><br>

        <button onclick="confirmarSenha()">Iniciar</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="script.js"></script>
</body>
</html>
