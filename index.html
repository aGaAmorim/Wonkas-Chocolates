<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Wonka’s Chocolate's Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>
    <img src="ticket.png" alt="Ticket" class="icone">
    Wonka’s Chocolate's
</h1>
    
<p>Escolha 3 cartas e encontre os Golden Tickets!</p>

<div class="grid" id="grid"></div>

<p id="message"></p>

<button onclick="novaRodada()">Nova Rodada</button>

<!-- Modal de senha -->
<div id="modalSenha" class="modal">
    <div class="modal-content">
        <h3>🔒 Área do Administrador</h3>
        <input type="password" id="inputSenha" placeholder="Digite a senha">
        <br><br>
        <button onclick="confirmarSenha()">Confirmar</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
